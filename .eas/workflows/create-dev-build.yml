# Only triggers with eas workflow:run .eas/workflows/create-dev-build.yml
name: Create Development Build

jobs:
  android_development_build:
    name: Build Android
    type: build
    params:
      platform: android
      profile: development

  ios_device_development_build:
    name: Build iOS device
    type: build
    params:
      platform: ios
      profile: development
