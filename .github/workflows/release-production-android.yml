name: Release Production Android

on:
  workflow_dispatch:

jobs:
  release:
    name: Download & Release APK
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check for EXPO_TOKEN
        run: |
          if [ -z "${{ secrets.EXPO_TOKEN }}" ]; then
            echo "You must provide an EXPO_TOKEN secret linked to this project's Expo account in this repo's secrets. Learn more: https://docs.expo.dev/eas-update/github-actions"
            exit 1
          fi

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm ci

      - name: Get app version
        id: version
        run: echo "app_version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Get latest production build artifact
        id: build_info
        run: |
          BUILD_JSON=$(eas build:list --profile production --platform android --status finished --limit 1 --json --non-interactive)
          ARTIFACT_URL=$(echo "$BUILD_JSON" | jq -r '.[0].artifacts.buildUrl')
          echo "artifact_url=$ARTIFACT_URL" >> "$GITHUB_OUTPUT"

      - name: Download APK
        run: curl -L -o reminder.apk "${{ steps.build_info.outputs.artifact_url }}"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="v${{ steps.version.outputs.app_version }}"
          git tag "$TAG"
          git push origin "$TAG"
          gh release create "$TAG" reminder.apk \
            --title "Reminder $TAG" \
            --generate-notes
