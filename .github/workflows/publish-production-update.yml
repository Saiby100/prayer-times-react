name: Publish Production OTA Update

on:
  push:
    branches:
      - main

jobs:
  detect:
    name: Check if patch release
    runs-on: ubuntu-latest
    outputs:
      is_patch: ${{ steps.check.outputs.is_patch }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compare version against latest tag
        id: check
        run: |
          CURRENT_VERSION=$(node -p "require('./package.json').version")
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          PREV_VERSION="${LATEST_TAG#v}"

          CURRENT_MINOR="${CURRENT_VERSION%.*}"
          PREV_MINOR="${PREV_VERSION%.*}"

          echo "Latest tag: $LATEST_TAG (version: $PREV_VERSION)"
          echo "Current version: $CURRENT_VERSION"

          if [ "$CURRENT_MINOR" = "$PREV_MINOR" ]; then
            echo "is_patch=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_patch=false" >> "$GITHUB_OUTPUT"
          fi

  ota_update:
    name: Publish OTA Update
    needs: detect
    if: needs.detect.outputs.is_patch == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Check for EXPO_TOKEN
        run: |
          if [ -z "${{ secrets.EXPO_TOKEN }}" ]; then
            echo "You must provide an EXPO_TOKEN secret linked to this project's Expo account in this repo's secrets."
            exit 1
          fi

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm ci

      - name: Publish OTA update
        run: eas update --environment production --non-interactive --message "${{ github.event.head_commit.message }}"
